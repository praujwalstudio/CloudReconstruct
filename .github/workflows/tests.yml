name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ --tb=short -v

      - name: Verify imports
        run: python -c "
          from src.models.cloud_density import CloudDensityNet;
          from src.models.thin_cloud_correction import ThinCloudCorrection;
          from src.models.temporal_fusion import TemporalFusion;
          from src.models.sar_fusion import SARConditionalUNet, SARDiffusionWrapper;
          from src.evaluation.inference import CloudFreeInference;
          from src.evaluation.metrics import compute_all_metrics;
          from src.evaluation.confidence import compute_confidence;
          from src.training.losses import CombinedLoss;
          print('All imports OK')
        "
